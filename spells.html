<!DOCTYPE html>
<html lang="en" class="h-100">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="favicon.ico">
    <meta name="description" content="Waterdeep Project - Spells">
    <meta name="author" content="Evan Carraway">
    <title>Waterdeep - Spells</title>
    <style>
        /* Embedded CSS for Styling */
        #spell-humorous-desc {
            font-style: italic;
            padding: 15px;
            border-left: 4px solid #14110d;
            margin: 20px 0;
            /* background-color: #fef8f0; */
            quotes: "“" "”";
        }
        #spell-humorous-desc::before {
            content: open-quote;
            font-size: 1.5em;
            font-weight: bold;
            /* color: #d2b48c; */
        }
        #spell-humorous-desc::after {
            content: close-quote;
            font-size: 1.5em;
            font-weight: bold;
            /* color: #d2b48c; */
        }
        #spell-aliases {
            font-size: 0.9em;
            font-style: italic;
            /* color: #d2b48c; */
        }
    </style>
    <link href="css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="css/sticky-footer-navbar.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.19/css/jquery.dataTables.min.css"/>  
    <script src="https://www.gstatic.com/charts/loader.js"></script>
  </head>

  <body  style="width:100%">
    <div id="header"></div>

    <main style="width:100%">
      <div hidden id="spell-container"  class="container" style="width:100%; padding-top:60px;">
        <h1 id="spell-title"  class="container" style="text-align:center;padding-bottom:30px;vertical-align:middle"></h1>
        <div id="spell-arrows-top"  class="container" style="padding-top:10px;padding-bottom:30px;">
          <div style="text-align: center;">
            <a href="spells.html" class="btn btn-primary">← Back to All Spells</a>
          </div>
        </div>
        <div id="spell-body" class="p-3 border rounded shadow-sm bg-light" style="width:100%">
        </div>
        <div id="spell-arrows-bottom"  class="container" style="padding-top:30px;padding-bottom:30px;">
          <div style="text-align: center;">
            <a href="spells.html" class="btn btn-primary">← Back to All Spells</a>
          </div>
        </div>
      </div>
      
      <div hidden id="table-container" class="container" style="padding-top:60px;">  
        <h1 class="text-center" style="padding-bottom:30px;">All Magical Spells</h1>
        <table id="data-table" class="display" style="width:100%">
          <thead>
            <tr>
              <th>Image</th>
              <th>chapter</th>
              <th>Name</th>
              <th>Full Name</th>
              <th>Level</th>
              <th>Category</th>
              <th>Description</th>
            </tr>
          </thead>
        </table>
      </div>  
    </main>

    <footer class="footer mt-auto py-3 bg-white">
      <div class="container-fluid">
        <span class="text-muted">© Carraway 2025</span>
      </div>
    </footer>
    
    <script src="js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="js/jquery-3.6.0.js"></script> 
    <script src="https://cdn.datatables.net/1.10.19/js/jquery.dataTables.min.js"></script>
	  <script>
      $(function(){
        $("#header").load("header.html",  function(){
          document.getElementById("spells").classList.add('active'); // Assuming an 'spells' link in header.html
        });
      });
    </script>
    <script>
       $(document).ready(function() {
        var searchParams = new URLSearchParams(window.location.search);
        var spell_key = searchParams.has("i") ? searchParams.get("i") : 0;
        
        google.charts.load('current',{'packages':['corechart','table']});
        google.charts.setOnLoadCallback(drawAllSheets);

        async function fetchSpellData(filename) {
            // Placeholder for a full fetch function. In a real environment, this URL would be updated.
            const res = await fetch(filename);
            return await res.json();
        }

        async function drawAllSheets() {
          let spell_data_full = [];
          
          // 1. Fetch the main spell list
          const spells_short = await fetchSpellData('https://epcarraway.blob.core.windows.net/dnd/spell/spells_short.json');

          if (spell_key === 0) {
            // --- Table View Mode ---
            document.getElementById("table-container").hidden = false;
            let unique_spells = new Map();

            // Aggregate unique spells and find the best single description
            spells_short.forEach(spell => {
                // If this is the first time seeing the spell_key, or this entry is "rarer"
                if (!unique_spells.has(spell.spell_key) || (spell.level > unique_spells.get(spell.spell_key).level)) {
                    unique_spells.set(spell.spell_key, spell);
                }
            });

            let tableRows = [];
            unique_spells.forEach((spell, key) => {
                let chapterNumber = spell.ch_num;
                let chapterNumberUrl = '<a href="chapters.html?c=' + chapterNumber + '">' + chapterNumber + '</a>'
                let spellUrl = '<a href="spells.html?i=' + key + '">' + spell.name + '</a>';
                let thumbnailUrl = '<a href="spells.html?i=' + key + '"><img src="https://epcarraway.blob.core.windows.net/dnd/spell/' + key + '-200.jpg" onerror="this.onerror=null;this.src=\'https://via.placeholder.com/80x80.jpg?text=No+Image\';" style="width:80px"></a>';
                let categoryDisplay = Array.isArray(spell.category) ? spell.category.join(', ') : spell.category;

                tableRows.push([
                    thumbnailUrl,
                    chapterNumberUrl,
                    spellUrl,
                    spell.full_name,
                    spell.level,
                    categoryDisplay,
                    spell.short_description
                ]);
            });

            $('#data-table').DataTable( {
              paging: true,
              pageLength: 100,
              order: [[1, 'desc']],
              data: tableRows,
              columns: [
                { "title": "Image" },
                { 
                  "title": "chapter",
                  "className": 'dt-body-center',
                  "render": function(title, type, row, meta){
                    if(type === 'display'){
                        title = title;
                    }
                    
                    return title;
                  }
                },
                { "title": "Name", "className": 'dt-body-left' },
                { "title": "Full Name" },
                { "title": "Level" }, 
                { "title": "Category" }, 
                { "title": "Short Description" }
              ]
            });
            
          } else {
            // --- Single Spell View Mode ---
            document.getElementById("spell-container").hidden = false;
            
            // 2. Load the specific spell's full detail JSON (e.g., holyavenger.json)
            try {
                spell_data_full = await fetchSpellData('https://epcarraway.blob.core.windows.net/dnd/spell/' + spell_key + '.json');
                if (spell_data_full && spell_data_full.spell_chronology) {
                // 2. Assign the value to the new key
                spell_data_full.chronology = spell_data_full.spell_chronology;
                // 3. Delete the old key
                delete spell_data_full.spell_chronology;
              }
            } catch (e) {
                // Fallback to a single synthesized entry if a dedicated JSON file doesn't exist
                const specific_entries = spells_short.filter(i => i.spell_key === spell_key);
                if (specific_entries.length > 0) {
                    // Just pick the entry with the highest level as the "main" one for the title
                    specific_entries.sort((a, b) => b.level - a.level);
                    const main_entry = specific_entries[0];
                    spell_data_full.chronology ??= spell_data_full.spell_chronology;
                    spell_data_full = {
                        name: main_entry.name,
                        full_name: main_entry.full_name,
                        level: main_entry.level,
                        category: main_entry.category,
                        description: main_entry.short_description,
                        effects: [], // Cannot be determined from short data
                        characteristics: [], // Cannot be determined from short data
                        chronology: spell_data_full.chronology, // Built from all short entries below
                        spell_chronology: spell_data_full.chronology, // Built from all short entries below
                        aliases: [], // Cannot be determined from short data
                        first_ch_num: Math.min(...specific_entries.map(e => e.ch_num)),
                        last_ch_num: Math.max(...specific_entries.map(e => e.ch_num)),
                    };
                } else {
                    document.getElementById("spell-title").innerText = "Spell Not Found";
                    return;
                }
            }
            // 3. Populate the Single Spell View
            document.title = "Waterdeep - Spells: " + (spell_data_full.full_name || spell_data_full.name);
            document.getElementById("spell-title").innerText = (spell_data_full.full_name || spell_data_full.name);

            let htmlContent = `
                <div class="row">
                    <div class="col-md-4 text-center">
                        <img src="https://epcarraway.blob.core.windows.net/dnd/spell/${spell_key}.jpg" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x400.jpg?text=No+Image';" class="img-fluid rounded mb-3" style="max-height: 400px;">
                        <h4 class="mb-3">${spell_data_full.name} (Level ${spell_data_full.level === "Unknown" ? "Unknown" : spell_data_full.level})</h4>
                        <div>
                            <l id="spell-aliases" text->
                                 ${Array.isArray(spell_data_full.aliases) && spell_data_full.aliases.length > 0 ? 
                                    spell_data_full.aliases.map(a => `AKA <l>${a}</l>`).join(' ') :
                                    '<li>Unknown</li>'}
                            </l>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <h2>Description & Lore</h2>
                        <p>${spell_data_full.description}</p>
                        <p id="spell-humorous-desc">${spell_data_full.humorous_description}</p>
                        <hr>
                        <p><strong>Category:</strong> ${Array.isArray(spell_data_full.category) ? spell_data_full.category.join(', ') : spell_data_full.category}</p>
                        <p><strong>Appears In:</strong> Chapter <a href="chapters.html?c=${spell_data_full.first_ch_num}">${spell_data_full.first_ch_num}</a>${spell_data_full.first_ch_num === spell_data_full.last_ch_num ? '' : ` to Chapter <a href="chapters.html?c=${spell_data_full.last_ch_num}">${spell_data_full.last_ch_num}</a>`}</p>
                        <p><strong>Characteristics:</strong> ${Array.isArray(spell_data_full.characteristics) ? spell_data_full.characteristics.join(', ') : 'N/A'}</p>
                        <hr>
                        <h4>Effects</h4>
                        <ul>
                            ${Array.isArray(spell_data_full.effects) && spell_data_full.effects.length > 0 ? 
                                spell_data_full.effects.map(a => `<li>${a}</li>`).join('') :
                                '<li>Unknown</li>'}
                        </ul>
                    </div>
                </div>
                <hr>
                <h2>Chronology & Notable Sightings</h2>
                <ul class="list-group">
                    ${spell_data_full.chronology.map(e => 
                        `<li class="list-group-spell"><strong>${e.date}:</strong> ${e.milestone}</li>`
                    ).join('')}
                </ul>
            `;
            
            document.getElementById("spell-body").innerHTML = htmlContent;
          }
        }
      });
     </script> 
  </body>
</html>
